server:
  port: ${PORT:8080}

spring:
  application:
    name: qerp-backend
  datasource:
    url: ${QERP_DB_URL:jdbc:postgresql://localhost:5432/qerp}
    username: ${QERP_DB_USERNAME:qerp}
    password: ${QERP_DB_PASSWORD:qerp}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-init-sql: SET search_path TO ${QERP_DB_SCHEMA:qerp3}, public
  flyway:
    enabled: true
    default-schema: ${QERP_DB_SCHEMA:qerp3}
    schemas: ${QERP_DB_SCHEMA:qerp3}
    create-schemas: true
  jdbc:
    template:
      query-timeout: 5
